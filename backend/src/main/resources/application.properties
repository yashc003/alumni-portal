# ============================================================
# ⚙️ application.properties — Application Configuration
# ============================================================
# Spring Boot automatically reads this file on startup.
# Every setting here controls how the app behaves.
# Format: key=value (no spaces around the = sign)
# ============================================================


# ----------------------------------------------------------
# 🌐 SERVER CONFIGURATION
# ----------------------------------------------------------
# The port our backend server will run on.
# After starting, your API will be at: http://localhost:8080
# (We don't NEED to set this — 8080 is the default — but it's
# good practice to be explicit about it.)
server.port=8080

# Give our app a name (shows up in logs and monitoring tools)
spring.application.name=alumni-portal


# ----------------------------------------------------------
# 🗄️ DATABASE CONFIGURATION (PostgreSQL)
# ----------------------------------------------------------
# These settings tell Spring how to connect to your PostgreSQL database.
#
# BEFORE RUNNING THE APP: You need to create a database called "alumni_portal"
# in PostgreSQL. Open pgAdmin or psql and run:
#     CREATE DATABASE alumni_portal;
#
# spring.datasource.url format:
#   jdbc:postgresql://[host]:[port]/[database_name]
#   - jdbc:postgresql:// = I'm connecting to a PostgreSQL database
#   - localhost          = The database is on my own computer
#   - 5432               = PostgreSQL's default port
#   - alumni_portal      = The name of our database
spring.datasource.url=jdbc:postgresql://localhost:5432/alumni_portal

# Your PostgreSQL username and password
# (Change these if your PostgreSQL uses different credentials!)
spring.datasource.username=postgres
spring.datasource.password=postgres


# ----------------------------------------------------------
# 🏗️ JPA / HIBERNATE CONFIGURATION
# ----------------------------------------------------------
# JPA (Java Persistence API) is the standard for talking to databases
# using Java objects. Hibernate is the ENGINE that implements JPA.
#
# ddl-auto controls what Hibernate does with the database schema (tables) on startup:
#   - none:      Do nothing (production)
#   - validate:  Check that tables match our Java classes, throw error if not
#   - update:    Automatically CREATE or ALTER tables to match our Java classes ← WE USE THIS
#   - create:    Drop all tables and recreate them every time (loses data!)
#   - create-drop: Same as create, but also drops tables when app shuts down
#
# ⚠️ "update" is perfect for development — it creates tables automatically.
# In production, you'd use "none" or "validate" with manual migration scripts.
spring.jpa.hibernate.ddl-auto=update

# Tell Hibernate we're using PostgreSQL (so it generates PostgreSQL-compatible SQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Print SQL queries to the console (very helpful for learning!)
# You'll see things like: "Hibernate: select u1_0.id, u1_0.email from users u1_0 where..."
spring.jpa.show-sql=true

# Format the SQL output so it's readable (instead of one long line)
spring.jpa.properties.hibernate.format_sql=true


# ----------------------------------------------------------
# 📄 DATA INITIALIZATION (data.sql)
# ----------------------------------------------------------
# These two settings tell Spring to run our data.sql file on startup.
# data.sql contains the INSERT statement to create the first admin account.
#
# spring.sql.init.mode=always → Run data.sql every time the app starts
# spring.jpa.defer-datasource-initialization=true → Wait for Hibernate to create
#   the tables FIRST, then run data.sql (otherwise data.sql would fail because
#   the "users" table doesn't exist yet!)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# ----------------------------------------------------------
# 🎫 JWT (JSON Web Token) CONFIGURATION
# ----------------------------------------------------------
# These are custom properties (not built into Spring — we read them ourselves in code).
#
# jwt.secret: A secret key used to SIGN our JWT tokens.
#   Think of it like a stamp on a passport — only WE know the stamp pattern,
#   so we can verify if a token is genuine or forged.
#   This MUST be a Base64-encoded string, at least 256 bits (32 bytes) long.
#
# jwt.expiration-ms: How long a token is valid, in milliseconds.
#   86400000 ms = 24 hours
#   After this time, the user must log in again.
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgSldUIHRva2VuIGdlbmVyYXRpb24gMjU2Yml0
app.jwt.expiration-ms=86400000
